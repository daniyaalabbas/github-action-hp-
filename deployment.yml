apiVersion: apps/v1
kind: Deployment

metadata:
  name: my-k8s-web

spec:
  replicas: 5

  selector:
    matchLabels:
      app: my-k8s-web

  template:
    metadata:
      labels:
        app: my-k8s-web

    spec:
      containers:
      - name: my-k8s-web

        image: daniyaalabbas/my-k8s-web:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 5000

---

apiVersion: v1
kind: Service

metadata:
  name: my-k8s-web-service

spec:
  selector:
    app: my-k8s-web

  ports:
  - port: 5000
    targetPort: 5000
    nodePort: 30080

  type: NodePort
